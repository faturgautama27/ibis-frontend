<!-- Enhanced Page Header -->
<app-page-header title="Audit Trail" subtitle="Track and monitor all system changes" icon="pi pi-history">
</app-page-header>

<div class="main-layout px-6 py-6">
    <!-- Filters Card -->
    <app-enhanced-card variant="standard" class="mb-6">
        <div slot="header">
            <h3 class="card-title flex items-center gap-2">
                <i class="pi pi-filter text-primary-600"></i>
                Filters
            </h3>
            <p class="card-subtitle">Narrow down audit log entries</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Start Date</label>
                <p-datepicker [(ngModel)]="startDate" dateFormat="dd/mm/yy" [showIcon]="true"
                    class="w-full"></p-datepicker>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">End Date</label>
                <p-datepicker [(ngModel)]="endDate" dateFormat="dd/mm/yy" [showIcon]="true"
                    class="w-full"></p-datepicker>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">User</label>
                <input pInputText [(ngModel)]="userFilter" placeholder="Filter by user" class="w-full" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Action</label>
                <p-select [(ngModel)]="actionFilter" [options]="actionOptions" placeholder="All Actions"
                    [showClear]="true" class="w-full"></p-select>
            </div>
        </div>

        <div class="flex gap-3">
            <app-enhanced-button label="Search" icon="pi pi-search" variant="primary" size="md"
                (onClick)="loadAuditLogs()"></app-enhanced-button>
            <app-enhanced-button label="Export" icon="pi pi-download" variant="secondary" size="md"
                (onClick)="exportLogs()"></app-enhanced-button>
        </div>
    </app-enhanced-card>

    <!-- Audit Logs Table -->
    <app-enhanced-card variant="standard">
        <div slot="header">
            <h3 class="card-title flex items-center gap-2">
                <i class="pi pi-list text-primary-600"></i>
                Audit Log Entries
                <span
                    class="inline-flex items-center px-2 py-1 bg-primary-100 text-primary-700 rounded-full text-xs font-medium ml-2">
                    {{ auditLogs.length }} records
                </span>
            </h3>
            <p class="card-subtitle">Complete history of all system changes</p>
        </div>

        <app-enhanced-table [data]="auditLogs" [paginator]="true" [rows]="20" [searchable]="false" [showHeader]="false"
            emptyTitle="No Audit Logs Found" emptyMessage="No audit log entries match your current filters"
            emptyIcon="pi pi-history" [columnCount]="6">
            <ng-container slot="header">
                <th class="table-header-cell">Timestamp</th>
                <th class="table-header-cell">User</th>
                <th class="table-header-cell">Action</th>
                <th class="table-header-cell">Table</th>
                <th class="table-header-cell">Record ID</th>
                <th class="table-header-cell text-center">Changes</th>
            </ng-container>

            <ng-container slot="body">
                <ng-template #bodyTemplate let-log>
                    <td class="table-body-cell">
                        <span class="text-sm text-gray-700">{{ log.timestamp | date:'short' }}</span>
                    </td>
                    <td class="table-body-cell">
                        <div class="flex items-center gap-2">
                            <i class="pi pi-user text-gray-400 text-xs"></i>
                            <span class="text-sm font-medium text-gray-800">{{ log.user_name }}</span>
                        </div>
                    </td>
                    <td class="table-body-cell">
                        <app-status-badge [label]="log.action" [severity]="getActionSeverity(log.action)"
                            size="sm"></app-status-badge>
                    </td>
                    <td class="table-body-cell">
                        <span class="text-sm font-mono bg-gray-100 px-2 py-0.5 rounded text-gray-700">{{ log.table_name
                            }}</span>
                    </td>
                    <td class="table-body-cell">
                        <span class="text-sm text-gray-600">{{ log.record_id }}</span>
                    </td>
                    <td class="table-body-cell text-center">
                        <button pButton icon="pi pi-eye" class="p-button-sm p-button-text enhanced-btn hover-lift"
                            (click)="viewChanges(log)" pTooltip="View Changes" tooltipPosition="top"></button>
                    </td>
                </ng-template>
            </ng-container>
        </app-enhanced-table>
    </app-enhanced-card>
</div>
