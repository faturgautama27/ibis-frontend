<div class="item-master-container">
    <!-- Enhanced Page Header -->
    <app-page-header title="Item Master" subtitle="Manage raw materials and finished goods inventory"
        icon="pi pi-database" [primaryAction]="{
            label: 'Create Item',
            icon: 'pi pi-plus',
            severity: 'primary'
        }" (primaryActionClick)="onCreateItem()">
    </app-page-header>

    <!-- Search and Filters Card -->
    <app-enhanced-card variant="standard" customClass="mb-6">
        <div slot="header" class="flex items-center justify-between">
            <h3 class="text-lg font-semibold text-gray-900 m-0">Search & Filter</h3>
            <p-button label="Clear Filters" icon="pi pi-filter-slash" severity="secondary" [text]="true" size="small"
                (onClick)="onClearFilters()">
            </p-button>
        </div>

        <div class="flex flex-col gap-4">
            <!-- Search Bar -->
            <div class="w-full">
                <label class="text-sm font-medium text-gray-700 mb-2 block">Search Items</label>
                <span class="p-input-icon-left w-full">
                    <i class="pi pi-search"></i>
                    <input pInputText type="text" [value]="searchQuery()" (input)="onSearch($event)"
                        placeholder="Search by item code or name..." class="w-full" />
                </span>
            </div>

            <!-- Category Tabs -->
            <div class="w-full">
                <label class="text-sm font-medium text-gray-700 mb-2 block">Category Filter</label>
                <p-tabs [value]="activeTabIndex().toString()" (onChange)="onTabChange($event)">
                    <p-tablist>
                        <p-tab value="0" class="enhanced-tab">
                            <div class="flex items-center gap-2">
                                <i class="pi pi-list text-gray-600"></i>
                                <span>All Items</span>
                            </div>
                        </p-tab>
                        <p-tab value="1" class="enhanced-tab">
                            <div class="flex items-center gap-2">
                                <i class="pi pi-circle text-blue-600"></i>
                                <span>Raw Materials</span>
                                <app-status-badge [label]="((rawMaterialCount$ | async) || 0).toString()"
                                    severity="info" size="sm">
                                </app-status-badge>
                            </div>
                        </p-tab>
                        <p-tab value="2" class="enhanced-tab">
                            <div class="flex items-center gap-2">
                                <i class="pi pi-check-circle text-green-600"></i>
                                <span>Finished Goods</span>
                                <app-status-badge [label]="((finishedGoodCount$ | async) || 0).toString()"
                                    severity="success" size="sm">
                                </app-status-badge>
                            </div>
                        </p-tab>
                    </p-tablist>
                </p-tabs>
            </div>
        </div>
    </app-enhanced-card>

    <!-- Enhanced Data Table -->
    <app-enhanced-table [data]="(items$ | async) || []" [loading]="(loading$ | async) || false"
        [title]="getTableTitle()" [subtitle]="getTableSubtitle()" [searchable]="false" [paginator]="true" [rows]="25"
        [totalRecords]="((items$ | async) || []).length" [emptyTitle]="'No items found'"
        [emptyMessage]="getEmptyMessage()" [emptyIcon]="'pi pi-database'" [columnCount]="7" variant="default"
        customClass="item-master-table">

        <!-- Table Header -->
        <ng-container slot="header">
            <th class="text-left font-semibold">Item Code</th>
            <th class="text-left font-semibold">Item Name</th>
            <th class="text-left font-semibold">HS Code</th>
            <th class="text-left font-semibold">Category</th>
            <th class="text-left font-semibold">Unit</th>
            <th class="text-center font-semibold">Status</th>
            <th class="text-center font-semibold">Actions</th>
        </ng-container>

        <!-- Table Body -->
        <ng-container slot="body">
            <ng-template #bodyTemplate let-item>
                <td class="font-medium text-gray-900">
                    <div class="flex items-center gap-2">
                        <span class="font-mono text-sm bg-gray-100 px-2 py-1 rounded">
                            {{ item.item_code }}
                        </span>
                    </div>
                </td>

                <td>
                    <div class="font-medium text-gray-900">{{ item.item_name }}</div>
                    <div *ngIf="item.description" class="text-xs text-gray-500 mt-1 line-clamp-2">
                        {{ item.description }}
                    </div>
                </td>

                <td>
                    <span class="font-mono text-sm text-gray-700 bg-gray-50 px-2 py-1 rounded">
                        {{ item.hs_code }}
                    </span>
                </td>

                <td>
                    <app-status-badge [label]="getCategoryLabel(item.category)"
                        [severity]="getCategorySeverity(item.category)" [icon]="getCategoryIcon(item.category)">
                    </app-status-badge>
                </td>

                <td class="text-gray-700 font-medium">
                    {{ item.unit }}
                </td>

                <td class="text-center">
                    <app-status-badge [label]="getStatusLabel(item.active)" [severity]="getStatusSeverity(item.active)"
                        [icon]="item.active ? 'pi pi-check-circle' : 'pi pi-times-circle'">
                    </app-status-badge>
                </td>

                <td class="text-center">
                    <div class="flex items-center justify-center gap-1">
                        <p-button icon="pi pi-eye" severity="info" [text]="true" [rounded]="true" size="small"
                            pTooltip="View Details" tooltipPosition="top"
                            styleClass="hover:scale-110 transition-transform duration-200" (onClick)="onViewItem(item)">
                        </p-button>
                        <p-button icon="pi pi-pencil" severity="secondary" [text]="true" [rounded]="true" size="small"
                            pTooltip="Edit Item" tooltipPosition="top"
                            styleClass="hover:scale-110 transition-transform duration-200" (onClick)="onEditItem(item)">
                        </p-button>
                        <p-button icon="pi pi-trash" severity="danger" [text]="true" [rounded]="true" size="small"
                            pTooltip="Delete Item" tooltipPosition="top"
                            styleClass="hover:scale-110 transition-transform duration-200"
                            (onClick)="onDeleteItem(item)">
                        </p-button>
                    </div>
                </td>
            </ng-template>
        </ng-container>

        <!-- Empty State Actions -->
        <ng-container slot="empty-actions">
            <p-button label="Create First Item" icon="pi pi-plus" severity="primary" (onClick)="onCreateItem()">
            </p-button>
        </ng-container>
    </app-enhanced-table>
</div>

<!-- Confirmation Dialog -->
<p-confirmDialog styleClass="enhanced-confirm-dialog">
</p-confirmDialog>
