<div class="item-list-container p-4">
    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Item Master</h2>
        <p-button label="Create Item" icon="pi pi-plus" (onClick)="onCreateItem()" severity="primary">
        </p-button>
    </div>

    <!-- Search Bar -->
    <div class="mb-4">
        <span class="p-input-icon-left w-full md:w-96">
            <i class="pi pi-search"></i>
            <input pInputText type="text" [value]="searchQuery()" (input)="onSearch($event)"
                placeholder="Search by item code or name..." class="w-full" />
        </span>
    </div>

    <!-- Category Tabs -->
    <p-tabView [activeIndex]="activeTabIndex()" (onChange)="onTabChange($event)">

        <!-- All Items Tab -->
        <p-tabPanel header="All Items">
            <ng-template pTemplate="header">
                <span>All Items</span>
            </ng-template>
            <ng-container *ngTemplateOutlet="itemTable"></ng-container>
        </p-tabPanel>

        <!-- Raw Materials Tab -->
        <p-tabPanel>
            <ng-template pTemplate="header">
                <span>Raw Materials</span>
                <p-tag [value]="(rawMaterialCount$ | async) || 0" severity="info" class="ml-2">
                </p-tag>
            </ng-template>
            <ng-container *ngTemplateOutlet="itemTable"></ng-container>
        </p-tabPanel>

        <!-- Finished Goods Tab -->
        <p-tabPanel>
            <ng-template pTemplate="header">
                <span>Finished Goods</span>
                <p-tag [value]="(finishedGoodCount$ | async) || 0" severity="success" class="ml-2">
                </p-tag>
            </ng-template>
            <ng-container *ngTemplateOutlet="itemTable"></ng-container>
        </p-tabPanel>
    </p-tabView>
</div>

<!-- Item Table Template -->
<ng-template #itemTable>
    <p-table [value]="(items$ | async) || []" [loading]="(loading$ | async) || false" [paginator]="true" [rows]="10"
        [rowsPerPageOptions]="[10, 25, 50]" [showCurrentPageReport]="true"
        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} items" styleClass="p-datatable-sm"
        [tableStyle]="{ 'min-width': '60rem' }">

        <ng-template pTemplate="header">
            <tr>
                <th *ngFor="let col of columns">{{ col.header }}</th>
                <th class="text-center">Actions</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-item>
            <tr>
                <td>{{ item.item_code }}</td>
                <td>{{ item.item_name }}</td>
                <td>{{ item.hs_code }}</td>
                <td>
                    <p-tag [value]="getCategoryLabel(item.category)" [severity]="getCategorySeverity(item.category)">
                    </p-tag>
                </td>
                <td>{{ item.unit }}</td>
                <td>
                    <p-tag [value]="getStatusLabel(item.active)" [severity]="getStatusSeverity(item.active)">
                    </p-tag>
                </td>
                <td class="text-center">
                    <div class="flex gap-2 justify-center">
                        <p-button icon="pi pi-eye" [rounded]="true" [text]="true" severity="info"
                            (onClick)="onViewItem(item)" pTooltip="View Details" tooltipPosition="top">
                        </p-button>
                        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="warning"
                            (onClick)="onEditItem(item)" pTooltip="Edit Item" tooltipPosition="top">
                        </p-button>
                        <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger"
                            (onClick)="onDeleteItem(item)" pTooltip="Delete Item" tooltipPosition="top">
                        </p-button>
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td [attr.colspan]="columns.length + 1" class="text-center py-8">
                    <div class="flex flex-col items-center gap-2">
                        <i class="pi pi-inbox text-4xl text-gray-400"></i>
                        <p class="text-gray-500">No items found</p>
                        <p-button label="Clear Filters" icon="pi pi-filter-slash" [text]="true"
                            (onClick)="onClearFilters()">
                        </p-button>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</ng-template>

<!-- Confirmation Dialog -->
<p-confirmDialog></p-confirmDialog>
