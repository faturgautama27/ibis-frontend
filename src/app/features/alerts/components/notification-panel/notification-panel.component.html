<!-- Notification Bell Button -->
<p-button icon="pi pi-bell" class="p-button-rounded p-button-text relative" (click)="togglePanel()"
    [badge]="unreadCount > 0 ? unreadCount.toString() : ''" badgeSeverity="danger"></p-button>

<!-- Notification Drawer -->
<p-drawer [(visible)]="visible" position="right" [style]="{width: '420px'}">
    <ng-template pTemplate="header">
        <div class="flex justify-between items-center w-full">
            <div class="flex items-center gap-3">
                <div
                    class="flex items-center justify-center w-10 h-10 bg-gradient-to-br from-primary-100 to-primary-50 rounded-xl shadow-sm">
                    <i class="pi pi-bell text-primary-600 text-lg"></i>
                </div>
                <div>
                    <h3 class="text-lg font-bold text-gray-900 mb-0">Notifications</h3>
                    <p class="text-xs text-gray-500 mb-0">{{ unreadCount }} unread</p>
                </div>
            </div>
        </div>
    </ng-template>

    <!-- Filter Section -->
    <div class="notification-filter-section mb-4">
        <div class="mb-3">
            <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">
                Filter by Severity
            </label>
            <p-select [(ngModel)]="selectedSeverity" [options]="severityOptions" optionLabel="label" optionValue="value"
                placeholder="All Severities" [showClear]="true" class="w-full" (onChange)="loadAlerts()"></p-select>
        </div>

        <div class="flex gap-2">
            <app-enhanced-button label="Mark All Read" icon="pi pi-check" variant="secondary" size="sm"
                [disabled]="unreadCount === 0" (onClick)="markAllAsRead()" [fullWidth]="true"></app-enhanced-button>
            <app-enhanced-button label="Clear Old" icon="pi pi-trash" variant="secondary" size="sm"
                (onClick)="clearOldAlerts()" [fullWidth]="true"></app-enhanced-button>
        </div>
    </div>

    <!-- Alerts List -->
    <div class="notification-list space-y-2">
        @for (alert of alerts; track alert.id) {
        <div class="notification-item" [class.notification-item--unread]="!alert.is_read"
            [class.notification-item--read]="alert.is_read" (click)="handleAlertClick(alert)">
            <div class="flex items-start gap-3">
                <div class="notification-icon-wrapper"
                    [class.notification-icon-wrapper--critical]="alert.severity === 'CRITICAL'"
                    [class.notification-icon-wrapper--warning]="alert.severity === 'WARNING'"
                    [class.notification-icon-wrapper--info]="alert.severity === 'INFO'">
                    <i [class]="getAlertIcon(alert.type)" class="text-base"></i>
                </div>

                <div class="flex-1 min-w-0">
                    <div class="flex items-start justify-between gap-2 mb-1">
                        <h4 class="font-semibold text-sm text-gray-900 truncate">
                            {{ alert.title }}
                        </h4>
                        <app-status-badge [label]="alert.severity" [severity]="getSeverityColor(alert.severity)"
                            size="sm"></app-status-badge>
                    </div>

                    <p class="text-sm text-gray-600 mb-2 leading-relaxed">{{ alert.message }}</p>

                    <div class="flex items-center justify-between">
                        <span class="text-xs text-gray-400">
                            {{ alert.created_at | date:'short' }}
                        </span>

                        <div class="flex gap-1">
                            @if (!alert.is_read) {
                            <button pButton icon="pi pi-check" class="p-button-sm p-button-text p-button-rounded"
                                (click)="markAsRead(alert.id, $event)" pTooltip="Mark as read"></button>
                            }
                            <button pButton icon="pi pi-times"
                                class="p-button-sm p-button-text p-button-rounded p-button-danger"
                                (click)="deleteAlert(alert.id, $event)" pTooltip="Delete"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        }

        @if (alerts.length === 0) {
        <app-empty-state icon="pi pi-bell" title="No Notifications"
            description="You're all caught up! No notifications to display." context="card" size="sm"></app-empty-state>
        }
    </div>
</p-drawer>
