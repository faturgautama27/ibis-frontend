<!-- PrimeNG Toast for notifications -->
<p-toast />

<!-- Page transition wrapper -->
<div class="page-container" [class]="transitionClass" [class.transitioning]="isTransitioning">

</div>

<!-- Loading overlay for transitions -->
<div class="transition-loading" *ngIf="isTransitioning">
    <div class="loading-spinner"></div>
</div>
