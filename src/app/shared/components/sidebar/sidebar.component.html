<div class="flex flex-col bg-white h-screen border-r border-y-0 border-l-0 border-gray-200 border-solid transition-all duration-300 shadow-lg"
    [ngClass]="sidebarWidthClass">
    <!-- Brand Section -->
    <div
        class="flex flex-row gap-3 items-center p-6 border-b border-t-0 border-x-0 border-solid border-gray-200 bg-gradient-to-br from-primary-50 via-white to-primary-25 relative overflow-hidden">
        <!-- Background decoration -->
        <div class="absolute inset-0 bg-gradient-to-br from-primary-100/20 to-transparent opacity-50"></div>

        <div *ngIf="isExpanded" class="flex flex-col items-start gap-2 mr-auto relative z-10">
            <div class="flex gap-3 items-center">
                <div
                    class="p-2.5 bg-gradient-to-br from-primary-500 to-primary-600 rounded-xl shadow-md hover:shadow-lg transition-all duration-200 hover:scale-105">
                    <img src="assets/images/network-security.png" alt="IBIS Logo"
                        class="h-6 w-6 filter brightness-0 invert">
                </div>
                <span class="text-primary-700 font-bold text-2xl leading-6 tracking-tight">
                    IBIS
                </span>
            </div>
            <span class="text-xs font-medium text-gray-600 ml-11 tracking-wide">Integrated Bonded Inventory
                System</span>
        </div>

        <div *ngIf="!isExpanded" class="flex justify-center w-full relative z-10">
            <div
                class="p-2.5 bg-gradient-to-br from-primary-500 to-primary-600 rounded-xl shadow-md hover:shadow-lg transition-all duration-200 hover:scale-105">
                <img src="assets/images/network-security.png" alt="IBIS Logo"
                    class="h-6 w-6 filter brightness-0 invert">
            </div>
        </div>

        <p-button [rounded]="true" severity="secondary" [icon]="toggleIcon"
            styleClass="p-button-sm hover:bg-primary-100 hover:border-primary-300 hover:shadow-md transition-all duration-200 hover:scale-105 relative z-10"
            (onClick)="handleToggleSidebar()"></p-button>
    </div>

    <!-- Menu Section -->
    <div class="flex flex-col w-full px-4 py-6 flex-1 overflow-y-auto custom-scrollbar">
        <p *ngIf="isExpanded" class="text-sm font-semibold text-gray-500 mb-4 px-3 uppercase tracking-wide">Main Menu
        </p>

        <div *ngFor="let item of menuItems; trackBy: trackByItemId" class="mb-2">
            <!-- Parent Menu Item -->
            <div class="flex flex-row gap-3 w-full items-center px-3 py-3 rounded-xl cursor-pointer transition-all duration-200 hover:bg-gradient-to-r hover:from-primary-50 hover:to-primary-25 hover:shadow-sm hover:scale-[1.02] group relative overflow-hidden"
                [ngClass]="menuAlignmentClass" [class.bg-gradient-to-r]="isActive(item.route) || hasActiveChild(item)"
                [class.from-primary-100]="isActive(item.route) || hasActiveChild(item)"
                [class.to-primary-50]="isActive(item.route) || hasActiveChild(item)"
                [class.border-l-4]="(isActive(item.route) || hasActiveChild(item)) && isExpanded"
                [class.border-primary-500]="(isActive(item.route) || hasActiveChild(item)) && isExpanded"
                [class.shadow-md]="isActive(item.route) || hasActiveChild(item)"
                (click)="handleClickMenu(item, $event)">

                <!-- Active indicator -->
                <div *ngIf="(isActive(item.route) || hasActiveChild(item)) && !isExpanded"
                    class="absolute left-0 top-1/2 transform -translate-y-1/2 w-1 h-8 bg-primary-500 rounded-r-full">
                </div>

                <lucide-icon [img]="item.icon" class="w-5 h-5 transition-all duration-200 group-hover:scale-110"
                    [class.text-primary-600]="isActive(item.route) || hasActiveChild(item)"
                    [class.text-gray-600]="!(isActive(item.route) || hasActiveChild(item))"
                    [class.group-hover:text-primary-600]="!(isActive(item.route) || hasActiveChild(item))"></lucide-icon>
                <p *ngIf="isExpanded" class="text-sm font-medium mb-0 flex-1 transition-all duration-200"
                    [class.text-primary-700]="isActive(item.route) || hasActiveChild(item)"
                    [class.text-gray-700]="!(isActive(item.route) || hasActiveChild(item))"
                    [class.group-hover:text-primary-700]="!(isActive(item.route) || hasActiveChild(item))">
                    {{ item.label }}
                </p>
                <i *ngIf="isExpanded && item.children && item.children.length > 0"
                    [class]="isMenuExpanded(item.id) ? 'pi pi-chevron-down' : 'pi pi-chevron-right'"
                    class="text-xs transition-all duration-200 group-hover:scale-110"
                    [class.text-primary-500]="isActive(item.route) || hasActiveChild(item)"
                    [class.text-gray-400]="!(isActive(item.route) || hasActiveChild(item))"
                    [class.group-hover:text-primary-500]="!(isActive(item.route) || hasActiveChild(item))"
                    [class.rotate-180]="isMenuExpanded(item.id)" style="font-size: 12px;"></i>
            </div>

            <!-- Nested Menu Items -->
            <div *ngIf="item.children && item.children.length > 0 && isMenuExpanded(item.id) && isExpanded"
                class="ml-6 mt-2 space-y-1 border-l-2 border-primary-100 pl-4 animate-slide-down">
                <div *ngFor="let child of item.children; trackBy: trackByChildId"
                    class="flex flex-row gap-3 w-full items-center px-3 py-2.5 rounded-lg cursor-pointer transition-all duration-200 hover:bg-gradient-to-r hover:from-primary-50 hover:to-primary-25 hover:shadow-sm hover:scale-[1.01] group relative"
                    [class.bg-gradient-to-r]="isActive(child.route)" [class.from-primary-100]="isActive(child.route)"
                    [class.to-primary-50]="isActive(child.route)" [class.border-l-3]="isActive(child.route)"
                    [class.border-primary-500]="isActive(child.route)" [class.shadow-sm]="isActive(child.route)"
                    (click)="handleClickMenu(child)">

                    <!-- Active indicator for nested items -->
                    <div *ngIf="isActive(child.route)"
                        class="absolute left-0 top-1/2 transform -translate-y-1/2 w-0.5 h-6 bg-primary-500 rounded-r-full">
                    </div>

                    <lucide-icon [img]="child.icon" class="w-4 h-4 transition-all duration-200 group-hover:scale-110"
                        [class.text-primary-600]="isActive(child.route)" [class.text-gray-500]="!isActive(child.route)"
                        [class.group-hover:text-primary-600]="!isActive(child.route)"></lucide-icon>
                    <p class="text-sm font-medium mb-0 transition-all duration-200"
                        [class.text-primary-700]="isActive(child.route)" [class.text-gray-600]="!isActive(child.route)"
                        [class.group-hover:text-primary-700]="!isActive(child.route)">
                        {{ child.label }}
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Section -->
    <div
        class="flex flex-col w-full px-4 py-6 border-t border-b-0 border-x-0 border-solid border-gray-200 bg-gradient-to-br from-gray-50 to-gray-25 relative">
        <!-- Background decoration -->
        <div class="absolute inset-0 bg-gradient-to-br from-gray-100/30 to-transparent opacity-50"></div>

        <p *ngIf="isExpanded"
            class="text-sm font-semibold text-gray-500 mb-4 px-3 uppercase tracking-wide relative z-10">Others</p>

        <div class="flex flex-row gap-3 w-full items-center px-3 py-3 rounded-xl cursor-pointer transition-all duration-200 hover:bg-white hover:shadow-md hover:scale-[1.02] group relative z-10 overflow-hidden"
            [ngClass]="menuAlignmentClass" [class.bg-white]="isActive('/configuration')"
            [class.border-l-4]="isActive('/configuration') && isExpanded"
            [class.border-primary-500]="isActive('/configuration') && isExpanded"
            [class.shadow-md]="isActive('/configuration')" (click)="handleClickSettings()">

            <!-- Active indicator for collapsed state -->
            <div *ngIf="isActive('/configuration') && !isExpanded"
                class="absolute left-0 top-1/2 transform -translate-y-1/2 w-1 h-8 bg-primary-500 rounded-r-full"></div>

            <lucide-icon [img]="SettingsIcon"
                class="w-5 h-5 transition-all duration-200 group-hover:scale-110 group-hover:rotate-45"
                [class.text-primary-600]="isActive('/configuration')"
                [class.text-gray-600]="!isActive('/configuration')"
                [class.group-hover:text-primary-600]="!isActive('/configuration')"></lucide-icon>
            <p *ngIf="isExpanded" class="text-sm font-medium mb-0 transition-all duration-200"
                [class.text-primary-700]="isActive('/configuration')"
                [class.text-gray-700]="!isActive('/configuration')"
                [class.group-hover:text-primary-700]="!isActive('/configuration')">Settings</p>
        </div>
    </div>
</div>
