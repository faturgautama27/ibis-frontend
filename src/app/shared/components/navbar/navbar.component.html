<div
    class="flex flex-row justify-between items-center px-6 py-4 bg-white shadow-md border-b border-gray-200 h-20 z-40 relative overflow-hidden">
    <!-- Background decoration -->
    <div class="absolute inset-0 bg-gradient-to-r from-white via-gray-50/30 to-primary-50/20 opacity-80"></div>

    <!-- Search Section -->
    <div class="flex w-full md:w-5/12 lg:w-4/12 relative z-10">
        <p-iconfield styleClass="w-full">
            <p-inputicon styleClass="pi pi-search text-gray-400" />
            <input type="text" pInputText placeholder="Search across inventory..."
                class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:ring-4 focus:ring-primary-100 transition-all duration-200 hover:border-gray-300 hover:shadow-sm bg-white/80 backdrop-blur-sm"
                [(ngModel)]="searchQuery" (keyup.enter)="handleSearch()" />
        </p-iconfield>
    </div>

    <!-- Actions Section -->
    <div class="hidden md:flex items-center gap-6 relative z-10">
        <!-- Notification Panel -->
        <div class="relative">
            <app-notification-panel></app-notification-panel>
        </div>

        <!-- User Profile -->
        <div class="flex flex-row items-center gap-4 pl-6 border-l border-y-0 border-r-0 border-solid border-gray-200 cursor-pointer hover:bg-gradient-to-r hover:from-gray-50 hover:to-primary-50/30 rounded-xl px-4 py-2 transition-all duration-200 hover:shadow-md hover:scale-[1.02] group"
            (click)="toggleUserMenu($event)">
            <p-avatar [label]="userInitials" shape="circle" [style]="avatarStyle"
                styleClass="shadow-md border-2 border-white group-hover:shadow-lg group-hover:scale-105 transition-all duration-200"></p-avatar>

            <div class="flex flex-col gap-0">
                <p
                    class="text-sm text-gray-800 font-semibold mb-0 group-hover:text-gray-900 transition-colors duration-200">
                    {{ userDisplayName }}
                </p>
                <p class="text-xs text-gray-500 mb-0 group-hover:text-gray-600 transition-colors duration-200">
                    {{ userRole }}
                </p>
            </div>

            <i
                class="pi pi-chevron-down text-gray-400 text-xs transition-all duration-200 group-hover:text-gray-600 group-hover:rotate-180"></i>
        </div>

        <!-- User Menu Dropdown -->
        <p-menu #userMenu [model]="userMenuItems" [popup]="true"
            styleClass="shadow-xl border border-gray-200 rounded-xl overflow-hidden backdrop-blur-sm"></p-menu>
    </div>

    <!-- Mobile Menu Button -->
    <div class="flex md:hidden relative z-10">
        <p-button icon="pi pi-bars" [rounded]="true" severity="secondary" [outlined]="true"
            styleClass="hover:bg-primary-50 hover:border-primary-200 hover:shadow-md hover:scale-105 transition-all duration-200 border-2"
            (onClick)="toggleMobileMenu()"></p-button>
    </div>
</div>
